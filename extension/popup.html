<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Job</title>
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080808;
    --surface:  rgba(255,255,255,0.03);
    --card:     rgba(255,255,255,0.05);
    --border:   rgba(255,255,255,0.09);
    --accent:   #7c3aed;
    --accent2:  #06b6d4;
    --accent3:  #f59e0b;
    --accent4:  #059669;
    --accent5:  #f43f5e;
    --text:     #e8e8e8;
    --muted:    rgba(255,255,255,0.38);
    --radius:   10px;
  }

  body {
    width: 360px;
    min-height: 480px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(124,58,237,0.06);
  }
  .logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { color: #fff; }
  .header-text h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; }
  .header-text p  { font-size: 10px; color: var(--muted); }

  /* Status dot */
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    margin-left: auto; flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.online  { background: var(--accent4); box-shadow: 0 0 6px var(--accent4); }
  .status-dot.offline { background: var(--accent5); }

  /* ── Job info card ── */
  .job-card {
    margin: 12px 12px 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    min-height: 54px;
  }
  .job-card .company {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }
  .job-card .role {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .job-card .no-job {
    color: var(--muted);
    font-size: 12px;
    padding: 4px 0;
  }

  /* Skills pills */
  .skills-row {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 8px;
  }
  .skill-pill {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 100px;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: #a78bfa;
  }

  /* ── Buttons ── */
  .btn-group {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .btn {
    width: 100%;
    padding: 9px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.18s, border-color 0.18s, transform 0.1s;
    position: relative;
    overflow: hidden;
    text-align: left;
  }
  .btn:hover   { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); }
  .btn:active  { transform: scale(0.98); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .btn.primary {
    background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(6,182,212,0.15));
    border-color: rgba(124,58,237,0.4);
    color: #c4b5fd;
  }
  .btn.primary:hover { background: linear-gradient(135deg, rgba(124,58,237,0.35), rgba(6,182,212,0.22)); }

  .btn.success {
    background: rgba(5,150,105,0.15);
    border-color: rgba(5,150,105,0.35);
    color: #6ee7b7;
  }
  .btn.success:hover { background: rgba(5,150,105,0.25); }

  .btn.amber {
    background: rgba(245,158,11,0.12);
    border-color: rgba(245,158,11,0.3);
    color: #fcd34d;
  }
  .btn.amber:hover { background: rgba(245,158,11,0.22); }

  .btn.danger {
    background: rgba(244,63,94,0.1);
    border-color: rgba(244,63,94,0.25);
    color: #fda4af;
  }
  .btn.danger:hover { background: rgba(244,63,94,0.18); }

  .btn-icon { flex-shrink: 0; }
  .btn-label { flex: 1; }
  .btn-sub { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }

  /* Spinner */
  .btn .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
    display: none;
  }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-icon { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Cover letter output ── */
  .cover-section {
    margin: 0 12px 12px;
    display: none;
  }
  .cover-section.show { display: block; }
  .cover-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .cover-header span { font-size: 10px; color: var(--muted); }
  .copy-btn {
    font-size: 10px; padding: 3px 8px;
    border-radius: 5px; border: 1px solid var(--border);
    background: var(--card); color: var(--text);
    cursor: pointer; transition: background 0.15s;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.09); }

  .cover-body {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    max-height: 180px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.6;
    color: rgba(255,255,255,0.75);
    white-space: pre-wrap;
    word-break: break-word;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(30,30,30,0.95);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 11px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 99;
  }
  #toast.show { opacity: 1; }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 12px 4px;
  }

  /* ── Fill counter badge ── */
  .fill-badge {
    font-size: 10px;
    padding: 1px 6px;
    background: rgba(5,150,105,0.2);
    border: 1px solid rgba(5,150,105,0.35);
    border-radius: 100px;
    color: #6ee7b7;
    margin-left: auto;
    display: none;
  }
  .fill-badge.show { display: inline-block; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polygon points="10 8 16 12 10 16 10 8"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Mission Job</h1>
    <p>AI Job Application Assistant</p>
  </div>
  <div class="status-dot" id="status-dot" title="API status"></div>
</div>

<!-- Detected job -->
<div class="job-card" id="job-card">
  <p class="no-job" id="no-job-msg">Detecting job page…</p>
  <div id="job-info" style="display:none">
    <div class="company" id="job-company"></div>
    <div class="role" id="job-role"></div>
    <div class="skills-row" id="skills-row"></div>
  </div>
</div>

<!-- Action buttons -->
<div class="btn-group">

  <button class="btn primary" id="btn-scrape">
    <span class="spinner"></span>
    <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <span class="btn-label">
      Scrape JD
      <span class="btn-sub">Extract job title, skills &amp; description</span>
    </span>
  </button>

  <button class="btn success" id="btn-fill" disabled>
    <span class="spinner"></span>
    <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    <span class="btn-label">
      Fill Form
      <span class="btn-sub">Auto-fill detected input fields</span>
    </span>
    <span class="fill-badge" id="fill-badge">0 fields</span>
  </button>

  <button class="btn amber" id="btn-cover" disabled>
    <span class="spinner"></span>
    <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
    <span class="btn-label">
      Generate Cover Letter
      <span class="btn-sub">Tailored via Ollama · auto-fills textarea</span>
    </span>
  </button>

  <div class="divider"></div>

  <button class="btn" id="btn-pdf">
    <span class="spinner"></span>
    <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <line x1="9" y1="15" x2="15" y2="15"/>
    </svg>
    <span class="btn-label">
      Download Resume PDF
      <span class="btn-sub">Latest compiled from LaTeX</span>
    </span>
  </button>

  <button class="btn danger" id="btn-clear" style="justify-content:center; font-size:11px; padding:6px;">
    Clear cache
  </button>

</div>

<!-- Cover letter output -->
<div class="cover-section" id="cover-section">
  <div class="cover-header">
    <span>AI Output · Ollama Mistral</span>
    <button class="copy-btn" id="copy-cover">Copy</button>
  </div>
  <div class="cover-body" id="cover-body"></div>
</div>

<div id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
